<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Invite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <div class="card invite-card">
            <img id="card-image" src="./Images/yes-gif-3.gif" class="card-img-top" alt="Cute date gif">

            <div class="card-body">
                <h5 id="card-title" class="card-title text-center mb-4">🌹<b>Dejt</b>🌹 ?</h5>

                <div id="card-actions" class="buttons">
                    <button class="btn" type="button" id="yes-btn">Yes</button>
                    <button class="btn" type="button" id="no-btn">No</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
